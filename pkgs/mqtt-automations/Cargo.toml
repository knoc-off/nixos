[package]
name = "mqtt-automations"
version = "0.1.0"
edition = "2021"

[lib]
name = "mqtt_automations"
path = "src/lib.rs"

[[bin]]
name = "button-dispatcher"
path = "src/bin/button_dispatcher.rs"

[[bin]]
name = "cat-doorbell"
path = "src/bin/cat_doorbell.rs"

[[bin]]
name = "plug-auto-off"
path = "src/bin/plug_auto_off.rs"

[[bin]]
name = "sunrise-lights"
path = "src/bin/sunrise_lights.rs"

[dependencies]
rumqttc = "0.24"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
ureq = { version = "2", features = ["json"] }
