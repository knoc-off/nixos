<pre id="marki-front-data" style="display:none;">{{Front}}</pre>
<div id="marki-front"></div>
<script>
function renderFront() {
    var md = document.getElementById('marki-front-data').textContent;
    document.getElementById('marki-front').innerHTML = wasm_bindgen.render_markdown(md);
}

if (!window.wasm_bindgen) {
    var s = document.createElement('script');
    s.src = '_marki.js';
    s.onload = function() {
        wasm_bindgen('_marki_bg.wasm').then(function() {
            wasm_bindgen.init_panic_hook();
            window._marki_ready = true;
            renderFront();
        });
    };
    document.head.appendChild(s);
} else if (!window._marki_ready) {
    wasm_bindgen('_marki_bg.wasm').then(function() {
        wasm_bindgen.init_panic_hook();
        window._marki_ready = true;
        renderFront();
    });
} else {
    renderFront();
}
</script>
