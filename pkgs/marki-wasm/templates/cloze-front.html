<pre id="marki-cloze-data" style="display:none;">{{cloze:Text}}</pre>
<div id="marki-cloze"></div>
<script>
function _marki_renderCloze() {
    var md = document.getElementById('marki-cloze-data').textContent;
    document.getElementById('marki-cloze').innerHTML = wasm_bindgen.render_markdown(md);
    if (window.hljs) hljs.highlightAll();
}

function _marki_loadScript(src, cb, tag) {
    var s = document.createElement('script');
    s.src = src;
    if (tag) s.setAttribute('data-marki', tag);
    s.onload = cb;
    document.head.appendChild(s);
}

// wasm-bindgen's --target no-modules output declares `wasm_bindgen` with `let`
// at script scope, which does NOT create a property on `window`. So we must
// probe the lexical binding with `typeof`, and we must refuse to inject the
// script a second time (redeclaring a `let` throws SyntaxError). We mark our
// injected <script> tags with data-marki so a second call can see that load
// is already in flight and just wait for it.
function _marki_initAndRender(renderFn) {
    if (!window.hljs) {
        if (!document.querySelector('script[data-marki="hljs"]')) {
            _marki_loadScript('_hljs.js', function() { _marki_initAndRender(renderFn); }, 'hljs');
        } else {
            setTimeout(function() { _marki_initAndRender(renderFn); }, 20);
        }
        return;
    }
    if (typeof wasm_bindgen === 'undefined') {
        if (!document.querySelector('script[data-marki="wasm"]')) {
            _marki_loadScript('_marki.js', function() { _marki_initAndRender(renderFn); }, 'wasm');
        } else {
            setTimeout(function() { _marki_initAndRender(renderFn); }, 20);
        }
        return;
    }
    if (!window._marki_ready) {
        if (window._marki_initing) {
            setTimeout(function() { _marki_initAndRender(renderFn); }, 20);
            return;
        }
        window._marki_initing = true;
        wasm_bindgen('_marki_bg.wasm').then(function() {
            wasm_bindgen.init_panic_hook();
            window._marki_ready = true;
            window._marki_initing = false;
            renderFn();
        });
    } else {
        renderFn();
    }
}

_marki_initAndRender(_marki_renderCloze);
</script>
