<pre id="marki-cloze-data" style="display:none;">{{cloze:Text}}</pre>
<div id="marki-cloze"></div>
<script>
(function() {
    var md = document.getElementById('marki-cloze-data').textContent;
    if (window._marki_ready) {
        document.getElementById('marki-cloze').innerHTML = wasm_bindgen.render_markdown(md);
    }
})();
</script>
<hr id="answer">
<pre id="marki-extra-data" style="display:none;">{{Back Extra}}</pre>
<div id="marki-extra"></div>
<script>
(function() {
    var md = document.getElementById('marki-extra-data').textContent;
    if (md.trim() && window._marki_ready) {
        document.getElementById('marki-extra').innerHTML = wasm_bindgen.render_markdown(md);
    }
})();
</script>
