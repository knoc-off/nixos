# cc-schemas.toml — Canonical tool definitions
#
# This file defines the tool schemas that the upstream API expects.
# Each [[tool]] entry defines a tool name, description, and input schema.
#
# NOTE: These descriptions and schemas should be captured from a real
# session with the canonical client. The placeholders below have the
# correct structure but need real content.

[[tool]]
name = "Bash"
description = """
Executes a given bash command in a persistent shell session. \
The command is run in a bash shell with common utilities available. \
Each command runs in the same persistent shell session, so environment \
variables and directory changes persist between calls."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.command]
type = "string"
description = "The bash command to execute"

[tool.input_schema.properties.description]
type = "string"
description = "A brief description of what this command does"

[tool.input_schema.properties.timeout]
type = "number"
description = "Optional timeout in milliseconds (default: 120000)"

[tool.input_schema.properties.workdir]
type = "string"
description = "Optional working directory for the command"

[[tool]]
name = "Read"
description = """
Reads the contents of a file at the specified path. \
Returns the file content as text. For large files, use the \
offset and limit parameters to read specific portions."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.filePath]
type = "string"
description = "The absolute path to the file to read"

[tool.input_schema.properties.offset]
type = "number"
description = "Line offset to start reading from (0-based)"

[tool.input_schema.properties.limit]
type = "number"
description = "Maximum number of lines to read"

[[tool]]
name = "Write"
description = """
Writes content to a file at the specified path. \
Creates the file if it doesn't exist, or overwrites it if it does."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.filePath]
type = "string"
description = "The absolute path to the file to write"

[tool.input_schema.properties.content]
type = "string"
description = "The content to write to the file"

[[tool]]
name = "Edit"
description = """
Makes targeted edits to a file by replacing specific text. \
Uses exact string matching to find and replace content."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.filePath]
type = "string"
description = "The absolute path to the file to edit"

[tool.input_schema.properties.oldString]
type = "string"
description = "The exact text to find and replace"

[tool.input_schema.properties.newString]
type = "string"
description = "The replacement text"

[tool.input_schema.properties.replaceAll]
type = "boolean"
description = "Whether to replace all occurrences (default: false)"

[[tool]]
name = "Glob"
description = """
Finds files matching a glob pattern. Returns a list of matching \
file paths relative to the specified directory."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.pattern]
type = "string"
description = "The glob pattern to match"

[tool.input_schema.properties.path]
type = "string"
description = "The directory to search in"

[[tool]]
name = "Grep"
description = """
Searches for a pattern in files. Uses regular expressions to find \
matching lines across files in a directory tree."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.pattern]
type = "string"
description = "The regex pattern to search for"

[tool.input_schema.properties.path]
type = "string"
description = "The directory to search in"

[tool.input_schema.properties.include]
type = "string"
description = "Glob pattern to filter which files to search"

[[tool]]
name = "WebFetch"
description = """
Fetches a URL and returns its content. Supports various \
content types and can return raw text, markdown, or HTML."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.url]
type = "string"
description = "The URL to fetch"

[tool.input_schema.properties.format]
type = "string"
description = "Output format: 'text', 'markdown', or 'html'"

[tool.input_schema.properties.timeout]
type = "number"
description = "Optional timeout in milliseconds"

[[tool]]
name = "TodoWrite"
description = """
Creates or updates a todo list for tracking tasks. \
Manages a structured list of items with status and priority."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.todos]
type = "array"
description = "Array of todo items"

[[tool]]
name = "Task"
description = """
Delegates a task to a sub-agent for specialized processing. \
Used for complex operations that benefit from focused execution."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.description]
type = "string"
description = "A description of the task"

[tool.input_schema.properties.prompt]
type = "string"
description = "The prompt for the sub-agent"

[tool.input_schema.properties.subagent_type]
type = "string"
description = "The type of sub-agent to use"

[[tool]]
name = "AskUser"
description = """
Presents a question to the user and waits for their response. \
Supports multiple choice and free-form questions."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.questions]
type = "array"
description = "Array of questions to present"

[[tool]]
name = "GithubSearch"
description = """
Searches GitHub code repositories. Supports filtering by \
language, path, and repository."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.query]
type = "string"
description = "The search query"

[tool.input_schema.properties.repo]
type = "string"
description = "Repository to search in (owner/name)"

[tool.input_schema.properties.language]
type = "array"
description = "Programming languages to filter by"

[tool.input_schema.properties.path]
type = "string"
description = "Path pattern to filter by"

[[tool]]
name = "LibrarySearch"
description = """
Searches for documentation libraries by name and query. \
Returns matching libraries with their IDs for further lookup."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.query]
type = "string"
description = "The search query"

[tool.input_schema.properties.libraryName]
type = "string"
description = "The name of the library to search for"

[[tool]]
name = "LibraryDocs"
description = """
Queries documentation for a specific library by its ID. \
Returns relevant documentation snippets."""

[tool.input_schema]
type = "object"

[tool.input_schema.properties.libraryId]
type = "string"
description = "The library ID from LibrarySearch results"

[tool.input_schema.properties.query]
type = "string"
description = "The documentation query"
