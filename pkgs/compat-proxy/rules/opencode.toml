# opencode.toml -- OpenCode client rule file
#
# Patches OpenCode's system prompt with behavioral improvements and
# maps tool names to canonical upstream format. Does NOT wholesale
# replace the prompt -- keeps opencode's tool descriptions intact.

[meta]
client_name = "opencode"
target_cc_version = "2.1.97"

[system_prompt]
detect = "You are OpenCode"
# No replace_with_file -- keep opencode's prompt as base
append_file = "system-prompts/cc-enhancements.txt"

# Identity scrubbing -- strip OpenCode branding without breaking
# tool references or MCP server names in the prompt.
[[system_prompt.text_replacements]]
find = "You are OpenCode, the best coding agent on the planet."
replace = "You are an expert coding assistant."

[[system_prompt.text_replacements]]
find = "OpenCode docs"
replace = "documentation"

[[system_prompt.text_replacements]]
find = "https://opencode.ai/docs"
replace = "https://docs.claude.com/en/docs/claude-code"

[[system_prompt.text_replacements]]
find = "https://github.com/anomalyco/opencode"
replace = "https://github.com/anthropics/claude-code/issues"

[[system_prompt.text_replacements]]
find = "can OpenCode do"
replace = "can the assistant do"

[[system_prompt.text_replacements]]
find = "does OpenCode have"
replace = "does the assistant have"

[[system_prompt.text_replacements]]
find = "use a specific OpenCode feature"
replace = "use a specific feature"

[[system_prompt.text_replacements]]
find = "asks about OpenCode"
replace = "asks about the assistant"

[[system_prompt.text_replacements]]
find = "OpenCode"
replace = "the assistant"


[tools]
unmapped_policy = "passthrough"

[[tools.rename]]
from = "bash"
to_schema = "Bash"

[[tools.rename]]
from = "read"
to_schema = "Read"

[[tools.rename]]
from = "write"
to_schema = "Write"

[[tools.rename]]
from = "edit"
to_schema = "Edit"

[[tools.rename]]
from = "glob"
to_schema = "Glob"

[[tools.rename]]
from = "grep"
to_schema = "Grep"

[[tools.rename]]
from = "webfetch"
to_schema = "WebFetch"

[[tools.rename]]
from = "todowrite"
to_schema = "TodoWrite"

[[tools.rename]]
from = "task"
to_schema = "Task"

[[tools.rename]]
from = "question"
to_schema = "AskUser"

[[tools.rename]]
from = "grep_searchGitHub"
to_schema = "GithubSearch"

[[tools.rename]]
from = "context7_resolve-library-id"
to_schema = "LibrarySearch"

[[tools.rename]]
from = "context7_query-docs"
to_schema = "LibraryDocs"

[[tools.drop]]
name = "skill"

[properties]

[headers]
inject = []

[billing]
inject_block = true
cc_version = "2.1.97"
