[General]
DisableDefaultImports=false
MaxWarnings=-1

[Warnings]
# Treat genuinely broken code as errors so opencode surfaces them
ImportFailure=error
MissingProperty=error
UnresolvedType=error
UnqualifiedAccess=warning
IncompatibleType=error
MissingType=error
UnreachableCode=error
ReadOnlyProperty=error

# Keep noisy / expected warnings at warning level
UnusedImports=info
